name: Sync upstream

on:
  schedule:
    - cron: '23 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stakeway-fork-2
          fetch-depth: 0

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/flare-foundation/fdc-suite-deployment.git
          git fetch upstream main

      - name: Check if behind
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"

      - name: Create sync branch and PR
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/sync-upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"

          if git merge upstream/main --no-edit; then
            echo "Merge successful"
          else
            echo "::warning::Merge conflict detected — manual resolution needed"
            git merge --abort
            git reset --hard upstream/main
          fi

          git push -u origin "$BRANCH"

          BEHIND=${{ steps.check.outputs.behind }}
          gh pr create \
            --base stakeway-fork-2 \
            --title "Sync upstream ($BEHIND new commits)" \
            --body "$(cat <<'PREOF'
          ## Upstream sync

          This PR merges new commits from upstream \`flare-foundation/fdc-suite-deployment:main\`.

          ### Review checklist
          - [ ] Check if upstream changed any base \`docker-compose.yaml\` — verify overrides still apply
          - [ ] Check if upstream changed config file formats (bitcoin.conf, rippled.conf, etc.)
          - [ ] Test with \`docker compose config\` in each service directory to validate merged compose
          - [ ] Check for container_name or port conflicts with existing -2 deployment

          Auto-generated by sync workflow
          PREOF
          )"
