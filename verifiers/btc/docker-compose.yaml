name: verifier-btc

x-django: &django
  image: ghcr.io/flare-foundation/verifier-utxo-indexer:v1.1.1@sha256:466c6936aadf6538d6d1f676b909e2bc979d17f49bce52cbadd37f0d9526712a
  env_file:
    - indexer.env
  environment:
    DB_PORT: 5432
    DB_HOST: database
  volumes:
    - btc-indexer-static:/appdata/static
    - btc-indexer-media:/appdata/media
  restart: unless-stopped
  depends_on:
    database:
      condition: service_healthy

x-django-management: &django-management
  <<: *django
  stop_signal: SIGINT
  depends_on:
    database:
      condition: service_healthy
    indexer-server:
      condition: service_healthy


services:
  database:
    container_name: verifier-btc-database
    image: postgres:18@sha256:52e6ffd11fddd081ae63880b635b2a61c14008c17fc98cdc7ce5472265516dd0
    env_file:
      - database.env
    ports:
      - 127.0.0.1:25431:5432
    restart: unless-stopped
    volumes:
      - btc-indexer-database:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      start_period: 60s
      start_interval: 2s

  verifier:
    image: ghcr.io/flare-foundation/verifier-indexer-api:v1.6.1@sha256:5bd9717dad96aca2f119eb95304857f8a0bfa1b4d196ef1aaa0889cc490dcc50
    container_name: verifier-btc-verifier
    env_file:
      - verifier.env
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - 9501:3100

  indexer-server:
    <<: *django
    container_name: verifier-btc-server
    ports:
      - 127.0.0.1:8401:8000
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://127.0.0.1:8000/metrics', timeout=5).raise_for_status()"]
      interval: 60s
      start_period: 60s
      start_interval: 2s

  indexer-indexer:
    <<: *django-management
    container_name: verifier-btc-index-blocks
    command: django-management block_indexing

  indexer-prune:
    <<: *django-management
    container_name: verifier-btc-prune-blocks
    command: django-management block_pruning

volumes:
  btc-indexer-static:
  btc-indexer-database:
  btc-indexer-media:
