      - 8.8.4.4
  verifier:
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 8.8.4.4
  indexer-server:
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 8.8.4.4
  indexer-indexer:
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 8.8.4.4

volumes:
