  btc-indexer-media:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/stakeway-fdc-suite-deployment/verifiers/btc/data/media
  btc-indexer-database:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/stakeway-fdc-suite-deployment/verifiers/btc/data/database
