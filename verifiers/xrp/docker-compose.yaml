name: verifier-xrp

services:
  database:
    container_name: verifier-xrp-database
    image: postgres:18@sha256:52e6ffd11fddd081ae63880b635b2a61c14008c17fc98cdc7ce5472265516dd0
    env_file:
      - database.env
    ports:
      - 127.0.0.1:25433:5432
    restart: unless-stopped
    volumes:
      - xrp-indexer-database:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      start_period: 60s
      start_interval: 2s

  indexer:
    container_name: verifier-xrp-indexer
    image: ghcr.io/flare-foundation/verifier-xrp-indexer:v2.0.0@sha256:81ca618a1c1fcb556fbdaa7df5eefb22ad8cc47030c9a7a219c8a8a9d66901e0
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./config.toml:/app/config.toml

  verifier:
    image: ghcr.io/flare-foundation/verifier-indexer-api:v1.5.0@sha256:f11bd83d8c9b6d58034273cf5fc8fd92f0daaae981cca811883fd6595e0f7827
    container_name: verifier-xrp-verifier
    env_file:
      - verifier.env
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - 9503:3100


volumes:
  xrp-indexer-database:
